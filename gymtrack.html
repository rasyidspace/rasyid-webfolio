<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker Mini</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            background-color: #f4f7f6;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #007bff;
        }

        .number-input-group {
            display: flex;
            align-items: center;
        }

        .number-input-group button {
            width: 45px;
            height: 45px;
            flex-shrink: 0;
            padding: 0;
            font-size: 24px;
            font-weight: bold;
            background: #e9ecef;
            color: #333;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .number-input-group button:hover {
            background: #dde0e3;
        }

        .number-input-group input {
            flex-grow: 1;
            text-align: center;
            border-radius: 0;
            border-left: none;
            border-right: none;
            height: 45px;
            -moz-appearance: textfield;
            appearance: textfield;
            font-weight: bold;
            font-size: 18px;
        }

        .number-input-group input::-webkit-outer-spin-button,
        .number-input-group input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .number-input-group button:first-child {
            border-radius: 5px 0 0 5px;
        }

        .number-input-group button:last-child {
            border-radius: 0 5px 5px 0;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #0056b3;
        }

        .btn-submit:disabled {
            background: #99c2ff;
            cursor: not-allowed;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            height: 24px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Catat Latihan</h2>
        <form id="gymForm">
            <div class="form-group">
                <label>Jadwal</label>
                <select name="jadwal" id="jadwalSelect" required>
                    <option value="" disabled selected>Pilih Jadwal</option>
                    <option value="Push Day">Push Day</option>
                    <option value="Pull Day">Pull Day</option>
                    <option value="Leg Day">Leg Day</option>
                    <option value="Shoulder Day">Shoulder Day</option>
                    <option value="Upper Body">Upper Body</option>
                    <option value="Rest Day">Rest Day</option>
                </select>
            </div>
            <div class="form-group">
                <label>Latihan</label>
                <select name="exercise" id="exerciseSelect" required>
                    <option value="" disabled selected>Pilih Jadwal Terlebih Dahulu</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sets</label>
                <div class="number-input-group">
                    <button type="button" onclick="updateNumber('sets', -1)">-</button>
                    <input type="number" id="sets" name="sets" value="1" min="1" required>
                    <button type="button" onclick="updateNumber('sets', 1)">+</button>
                </div>
            </div>
            <div class="form-group">
                <label>Reps</label>
                <div class="number-input-group">
                    <button type="button" onclick="updateNumber('reps', -1)">-</button>
                    <input type="number" id="reps" name="reps" value="10" min="0" required>
                    <button type="button" onclick="updateNumber('reps', 1)">+</button>
                </div>
            </div>
            <div class="form-group">
                <label>Berat (Kg)</label>
                <div class="number-input-group">
                    <button type="button" onclick="updateNumber('weight', -2.5, true)">-</button>
                    <input type="number" step="0.5" id="weight" name="weight" value="0" min="0" required>
                    <button type="button" onclick="updateNumber('weight', 2.5, true)">+</button>
                </div>
                <small id="lastRecord"
                    style="color: #007bff; display: block; margin-top: 5px; text-align: center; font-weight: bold; min-height: 18px;"></small>
                <small style="color: #888; display: block; margin-top: 5px; text-align: center;">Tombol +/- mengubah 2.5
                    kg</small>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">Simpan ke Sheets</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        // URL tetap sama, tidak diganti
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJQHVFdFKxuGwI7_B_02KHtJTWEBx5WIs64cmnfFHwL4MYWfPdU-ey8pEcpdABbJ8/exec";

        const workouts = {
            "Push Day": [
                "Incline Dumbell Press", "Flat Smith Press", "Cable Fly (Lower Chest)",
                "Pec Fly", "Cable Triceps Extension", "Cable Overhead Triceps Extension"
            ],
            "Pull Day": [
                "Cable Lat Pull Down", "Cable Row (Single)", "Machine Row (Single)",
                "T-Bar Row", "Rear Delt (Pec Deck)", "Dumbell Biceps Curl (Single)",
                "EZ Bar Biceps Curl", "Biceps Curl Machine (Freeweight)", "Biceps Curl Machine (Cable)"
            ],
            "Leg Day": [
                "Squat", "Smith Squat", "Leg Extension", "Hamstring Extension",
                "Hip Adduction", "Seated Abdominal", "Russian Twist Machine"
            ],
            "Shoulder Day": [
                "Shoulder Press Machine (Single)", "Shoulder Press Smith", "Shoulder Press Dumbell",
                "Dumbell Lateral Raises (Single)", "Lateral Raise Machine", "Lateral Raise Cable",
                "Rear Delt Pec Fly", "Cable Rear Delt Fly (Single)", "Cable Face Pull"
            ],
            "Upper Body": [
                "Lat Pull Down", "Incline Dumbell Press (Single)", "Single Cable Row",
                "Flat Chest Press", "T-Bar Row", "Palm Down Wrist Curl",
                "EZ Bar Curl Reverse Grip", "Cable Curl Reverse Grip", "Pec Dec Chest Fly", "Seated Abdominal"
            ],
            "Rest Day": ["Rest"]
        };

        const jadwalSelect = document.getElementById('jadwalSelect');
        const exerciseSelect = document.getElementById('exerciseSelect');

        jadwalSelect.addEventListener('change', function () {
            const selectedJadwal = this.value;
            const options = workouts[selectedJadwal] || [];

            exerciseSelect.innerHTML = '<option value="" disabled selected>Pilih Latihan</option>';
            options.forEach(exercise => {
                const opt = document.createElement('option');
                opt.value = exercise;
                opt.innerText = exercise;
                exerciseSelect.appendChild(opt);
            });
        });

        exerciseSelect.addEventListener('change', function () {
            const selectedExercise = this.value;
            const lastRecordLabel = document.getElementById('lastRecord');

            if (!selectedExercise) return;

            lastRecordLabel.innerText = 'Memuat data...';
            lastRecordLabel.style.color = '#888';

            fetch(`${SCRIPT_URL}?exercise=${encodeURIComponent(selectedExercise)}`, {
                method: 'GET'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        lastRecordLabel.innerText = `Last Record - ${selectedExercise} : ${data.weight} Kg`;
                        lastRecordLabel.style.color = '#007bff';
                    } else {
                        lastRecordLabel.innerText = `Belum ada riwayat untuk ${selectedExercise}`;
                        lastRecordLabel.style.color = '#888';
                    }
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    lastRecordLabel.innerText = 'Gagal memuat Last Record';
                    lastRecordLabel.style.color = 'red';
                });
        });

        function updateNumber(id, change, isFloat = false) {
            const input = document.getElementById(id);
            let val = isFloat ? parseFloat(input.value) : parseInt(input.value);
            if (isNaN(val)) val = 0;

            val += change;

            // Batas minimal 0 (atau 1 untuk sets)
            if (id === 'sets' && val < 1) val = 1;
            else if (val < 0) val = 0;

            // Hapus desimal .0 jika bilangan bulat
            input.value = isFloat ? val.toFixed(1).replace('.0', '') : val;
        }

        const form = document.getElementById('gymForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            submitBtn.innerText = "Menyimpan...";
            submitBtn.disabled = true;
            messageDiv.innerText = "";

            const formData = new FormData(form);

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData
            })
                .then(response => {
                    messageDiv.innerText = "✅ Berhasil dicatat!";
                    messageDiv.style.color = "green";
                    submitBtn.innerText = "Simpan ke Sheets";
                    submitBtn.disabled = false;

                    // UX Tambahan: Otomatis tambah 1 setelah klik simpan untuk lanjut set berikutnya
                    const currentSets = parseInt(document.getElementById('sets').value) || 1;
                    document.getElementById('sets').value = currentSets + 1;

                    // Hilangkan pesan sukses setelah 3 detik
                    setTimeout(() => {
                        messageDiv.innerText = "";
                    }, 3000);
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    messageDiv.innerText = "⚠️ Terjadi kesalahan.";
                    messageDiv.style.color = "red";
                    submitBtn.innerText = "Simpan ke Sheets";
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>

</html>
