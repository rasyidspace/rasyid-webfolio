<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker Mini</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/Icon/icon_meshlab.png">
    <link rel="apple-touch-icon" href="assets/Icon/icon_meshlab.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 24px;
            max-width: 450px;
            margin: auto;
            background-color: #06060b;
            color: #f0f0f5;
        }

        .back-nav {
            margin-bottom: 24px;
            display: inline-block;
        }

        .back-nav a {
            color: #a0a0b5;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-nav a:hover {
            color: #00d4ff;
        }

        .card {
            background: #12121e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #a0a0b5;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 14px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 15px;
            background: #0c0c14;
            color: #f0f0f5;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 1px #00d4ff;
        }

        select option {
            background: #0c0c14;
            color: #f0f0f5;
        }

        .number-input-group {
            display: flex;
            align-items: center;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #0c0c14;
        }

        .number-input-group:focus-within {
            border-color: #00d4ff;
        }

        .number-input-group button {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            padding: 0;
            font-size: 22px;
            background: rgba(255, 255, 255, 0.05);
            color: #f0f0f5;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .number-input-group button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .number-input-group input {
            flex-grow: 1;
            text-align: center;
            border: none;
            height: 48px;
            -moz-appearance: textfield;
            appearance: textfield;
            font-weight: 600;
            font-size: 16px;
            background: transparent;
        }

        .number-input-group input:focus {
            box-shadow: none;
        }

        .number-input-group input::-webkit-outer-spin-button,
        .number-input-group input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.25);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #message {
            margin-top: 20px;
            font-weight: 500;
            text-align: center;
            min-height: 24px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="back-nav">
        <a href="index.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            Kembali ke Home
        </a>
    </div>

    <div class="card">
        <h2>Catat Latihan</h2>
        <form id="gymForm">
            <div class="form-group">
                <label>Jadwal</label>
                <select name="jadwal" id="jadwalSelect" required>
                    <option value="" disabled selected>Pilih Jadwal</option>
                    <option value="Push Day">Push Day</option>
                    <option value="Pull Day">Pull Day</option>
                    <option value="Leg Day">Leg Day</option>
                    <option value="Shoulder Day">Shoulder Day</option>
                    <option value="Upper Body">Upper Body</option>
                    <option value="Rest Day">Rest Day</option>
                </select>
            </div>
            <div class="form-group">
                <label>Latihan</label>
                <select name="exercise" id="exerciseSelect" required>
                    <option value="" disabled selected>Pilih Jadwal Terlebih Dahulu</option>
                </select>
            </div>
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Sets</label>
                    <div class="number-input-group">
                        <button type="button" onclick="updateNumber('sets', -1)">-</button>
                        <input type="number" id="sets" name="sets" value="1" min="1" required>
                        <button type="button" onclick="updateNumber('sets', 1)">+</button>
                    </div>
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Reps</label>
                    <div class="number-input-group">
                        <button type="button" onclick="updateNumber('reps', -1)">-</button>
                        <input type="number" id="reps" name="reps" value="10" min="0" required>
                        <button type="button" onclick="updateNumber('reps', 1)">+</button>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Berat (Kg)</label>
                <div class="number-input-group">
                    <button type="button" onclick="updateNumber('weight', -2.5, true)">-</button>
                    <input type="number" step="0.5" id="weight" name="weight" value="0" min="0" required>
                    <button type="button" onclick="updateNumber('weight', 2.5, true)">+</button>
                </div>
                <small id="lastRecord"
                    style="color: #00d4ff; display: block; margin-top: 8px; text-align: center; font-weight: 500; min-height: 18px;"></small>
                <small style="color: #6a6a80; display: block; margin-top: 5px; text-align: center;">Tombol +/- mengubah 2.5 kg</small>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">Simpan ke Sheets</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJQHVFdFKxuGwI7_B_02KHtJTWEBx5WIs64cmnfFHwL4MYWfPdU-ey8pEcpdABbJ8/exec";

        const workouts = {
            "Push Day": [
                "Incline Dumbell Press", "Flat Smith Press", "Cable Fly (Lower Chest)",
                "Pec Fly", "Cable Triceps Extension", "Cable Overhead Triceps Extension"
            ],
            "Pull Day": [
                "Cable Lat Pull Down", "Cable Row (Single)", "Machine Row (Single)",
                "T-Bar Row", "Rear Delt (Pec Deck)", "Dumbell Biceps Curl (Single)",
                "EZ Bar Biceps Curl", "Biceps Curl Machine (Freeweight)", "Biceps Curl Machine (Cable)"
            ],
            "Leg Day": [
                "Squat", "Smith Squat", "Leg Extension", "Hamstring Extension",
                "Hip Adduction", "Seated Abdominal", "Russian Twist Machine"
            ],
            "Shoulder Day": [
                "Shoulder Press Machine (Single)", "Shoulder Press Smith", "Shoulder Press Dumbell",
                "Dumbell Lateral Raises (Single)", "Lateral Raise Machine", "Lateral Raise Cable",
                "Rear Delt Pec Fly", "Cable Rear Delt Fly (Single)", "Cable Face Pull"
            ],
            "Upper Body": [
                "Lat Pull Down", "Incline Dumbell Press (Single)", "Single Cable Row",
                "Flat Chest Press", "T-Bar Row", "Palm Down Wrist Curl",
                "EZ Bar Curl Reverse Grip", "Cable Curl Reverse Grip", "Pec Dec Chest Fly", "Seated Abdominal"
            ],
            "Rest Day": ["Rest"]
        };

        const jadwalSelect = document.getElementById('jadwalSelect');
        const exerciseSelect = document.getElementById('exerciseSelect');

        jadwalSelect.addEventListener('change', function () {
            const selectedJadwal = this.value;
            const options = workouts[selectedJadwal] || [];

            exerciseSelect.innerHTML = '<option value="" disabled selected>Pilih Latihan</option>';
            options.forEach(exercise => {
                const opt = document.createElement('option');
                opt.value = exercise;
                opt.innerText = exercise;
                exerciseSelect.appendChild(opt);
            });
        });

        exerciseSelect.addEventListener('change', function () {
            const selectedExercise = this.value;
            const lastRecordLabel = document.getElementById('lastRecord');

            if (!selectedExercise) return;

            lastRecordLabel.innerText = 'Memuat data...';
            lastRecordLabel.style.color = '#6a6a80';

            fetch(`${SCRIPT_URL}?exercise=${encodeURIComponent(selectedExercise)}`, {
                method: 'GET'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        lastRecordLabel.innerText = `Last Record - ${selectedExercise} : ${data.weight} Kg`;
                        lastRecordLabel.style.color = '#00d4ff';
                    } else {
                        lastRecordLabel.innerText = `Belum ada riwayat untuk ${selectedExercise}`;
                        lastRecordLabel.style.color = '#6a6a80';
                    }
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    lastRecordLabel.innerText = 'Gagal memuat Last Record';
                    lastRecordLabel.style.color = '#ef4444';
                });
        });

        function updateNumber(id, change, isFloat = false) {
            const input = document.getElementById(id);
            let val = isFloat ? parseFloat(input.value) : parseInt(input.value);
            if (isNaN(val)) val = 0;

            val += change;

            // Batas minimal
            if (id === 'sets' && val < 1) val = 1;
            else if (val < 0) val = 0;

            // Hapus nol di belakang jika integer
            input.value = isFloat ? val.toFixed(1).replace('.0', '') : val;
        }

        const form = document.getElementById('gymForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            submitBtn.innerText = "Menyimpan...";
            submitBtn.disabled = true;
            messageDiv.innerText = "";

            const formData = new FormData(form);

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData
            })
                .then(response => {
                    messageDiv.innerText = "✅ Berhasil dicatat!";
                    messageDiv.style.color = "#10b981";
                    submitBtn.innerText = "Simpan ke Sheets";
                    submitBtn.disabled = false;

                    const currentSets = parseInt(document.getElementById('sets').value) || 1;
                    document.getElementById('sets').value = currentSets + 1;

                    setTimeout(() => {
                        messageDiv.innerText = "";
                    }, 3000);
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    messageDiv.innerText = "⚠️ Terjadi kesalahan.";
                    messageDiv.style.color = "#ef4444";
                    submitBtn.innerText = "Simpan ke Sheets";
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>

</html>
